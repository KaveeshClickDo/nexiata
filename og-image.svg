<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64,0 L0,0 0,64" fill="none" stroke="#F5C518" stroke-width="0.7" opacity="0.035"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="25%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.88"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="42%">
      <stop offset="0%" stop-color="#F5C518" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F5C518" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#04040A"/>
  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Ambient glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- HUD corner brackets -->
  <polyline points="60,108 60,60 108,60" fill="none" stroke="#F5C518" stroke-width="2.5" stroke-linejoin="miter" opacity="0.65"/>
  <polyline points="1092,60 1140,60 1140,108" fill="none" stroke="#F5C518" stroke-width="2.5" stroke-linejoin="miter" opacity="0.65"/>
  <polyline points="60,522 60,570 108,570" fill="none" stroke="#F5C518" stroke-width="2.5" stroke-linejoin="miter" opacity="0.65"/>
  <polyline points="1092,570 1140,570 1140,522" fill="none" stroke="#F5C518" stroke-width="2.5" stroke-linejoin="miter" opacity="0.65"/>

  <!-- Eyebrow status label -->
  <text x="600" y="152"
    font-family="'Courier New',Courier,monospace"
    font-size="13"
    fill="#FF3A00"
    text-anchor="middle"
    letter-spacing="8"
    opacity="0.9">MISSION STATUS: STANDBY</text>

  <!-- Top divider -->
  <line x1="180" y1="176" x2="1020" y2="176" stroke="#18182A" stroke-width="1"/>

  <!-- Main NEXIATA title -->
  <text x="600" y="382"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-size="186"
    font-weight="900"
    fill="#E8E8F0"
    text-anchor="middle"
    letter-spacing="-3">NEXIATA</text>

  <!-- Subtitle -->
  <text x="600" y="432"
    font-family="Arial,Helvetica,sans-serif"
    font-size="16"
    font-weight="400"
    fill="#454560"
    text-anchor="middle"
    letter-spacing="9">WEB ENGINEERING</text>

  <!-- Divider below subtitle -->
  <line x1="370" y1="457" x2="830" y2="457" stroke="#18182A" stroke-width="1"/>

  <!-- Launch date badge -->
  <rect x="450" y="474" width="300" height="46" fill="#0F0F1A"/>
  <rect x="450" y="517" width="300" height="2" fill="#F5C518" opacity="0.75"/>
  <text x="600" y="502"
    font-family="'Courier New',Courier,monospace"
    font-size="14"
    fill="#F5C518"
    text-anchor="middle"
    letter-spacing="3">LAUNCHING AUGUST 1, 2026</text>

  <!-- Bottom domain -->
  <text x="600" y="592"
    font-family="'Courier New',Courier,monospace"
    font-size="12"
    fill="#454560"
    text-anchor="middle"
    letter-spacing="5"
    opacity="0.55">NEXIATA.COM</text>
</svg>
